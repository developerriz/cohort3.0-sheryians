<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Art Work</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <span class="ambient-dot dot-top-left"></span>
      <span class="ambient-dot dot-top-right"></span>
      <span class="ambient-dot dot-mid-left"></span>
      <span class="ambient-dot dot-mid-right"></span>
      <span class="ambient-dot dot-bottom-left"></span>
      <span class="ambient-dot dot-bottom-right"></span>

        <div class="section-bar">
          <h1>Explore Art Work</h1>
          <a href="#" class="see-all">See All</a>
        </div>

        <div class="card-grid">
          <div class="art-card">
            <div class="card-image-frame">
              <img
                src="https://images.unsplash.com/photo-1515405295579-ba7b45403062?auto=format&fit=crop&w=900&q=80"
                alt="Abstract eye artwork"
              />
            </div>
            <div class="card-meta">
              <h2>Monocular</h2>
              <div class="meta-side">
                <span>54.8k</span>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button type="button" class="bid-btn">Place Bid</button>
          </div>

          <div class="art-card">
            <div class="card-image-frame">
              <img
                src="https://images.unsplash.com/photo-1510137600163-2729bc6950f6?auto=format&fit=crop&w=900&q=80"

            <div class="card-meta">
